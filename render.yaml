# Render Blueprint for OSIRIS Dashboard
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: osiris-dashboard
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3005
